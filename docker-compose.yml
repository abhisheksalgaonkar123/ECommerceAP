services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ecommerce-sql
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Password@1
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - ecommerce-network

  redis:
    image: redis:latest
    container_name: ecommerce-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecommerce-network

  api:
    container_name: ecommerce-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=ECommerceDb;User Id=sa;Password=Password@1;TrustServerCertificate=True;Encrypt=False
      - ConnectionStrings__Redis=redis:6379
      - JwtSettings__Secret=YourSuperSecretKeyThatIsAtLeast32CharactersLong!
      - JwtSettings__Issuer=ECommerceAPI
      - JwtSettings__Audience=ECommerceClient
      - JwtSettings__ExpiryMinutes=15
      - JwtSettings__RefreshTokenExpiryDays=7
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      - sqlserver
      - redis
    networks:
      - ecommerce-network

volumes:
  sqlserver_data:
  redis_data:

networks:
  ecommerce-network:
    driver: bridge